<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'">
  <link rel="stylesheet" href="style.css">
  <title>Grimoire</title>
</head>
<body>
  <div id="widget">

    <!-- Top bar -->
    <div id="topbar">
      <span id="title-label">Grimoire</span>
      <div id="indicators">
        <span id="mem-indicator" class="indicator" title="Memory written">◈</span>
        <button id="pin-btn" class="active" title="Toggle always on top">⊞</button>
        <button id="focus-btn" title="Bring terminal to front">⌨</button>
        <button id="close-btn" title="Close">×</button>
      </div>
    </div>

    <!-- Face -->
    <div id="face-container">
      <svg id="face" viewBox="0 0 120 110" xmlns="http://www.w3.org/2000/svg">
        <ellipse id="head" cx="60" cy="56" rx="48" ry="46"/>
        <path id="brow-l" d="M25,38 Q40,33 55,38"/>
        <path id="brow-r" d="M65,38 Q80,33 95,38"/>
        <ellipse id="eye-l" cx="40" cy="52" rx="11" ry="6"/>
        <ellipse id="eye-r" cx="80" cy="52" rx="11" ry="6"/>
        <circle id="pupil-l" cx="40" cy="52" r="4"/>
        <circle id="pupil-r" cx="80" cy="52" r="4"/>
        <path id="mouth" d="M42,78 Q60,80 78,78"/>
      </svg>
    </div>

    <!-- Project + topic -->
    <div id="project-header">
      <div id="project-name-bar"><span id="project-name-text">—</span><span id="completion-pct"></span></div>
      <div id="project-desc-bar"><span id="project-desc-text">—</span></div>
    </div>
    <div id="project-bar"><span id="project-text">—</span></div>
    <div id="thought-bar"><span id="thought-text">—</span></div>
    <div id="topic-bar"><span id="topic-text">—</span></div>

    <!-- Bottom bar -->
    <div id="bottombar">
      <input id="ask-input" type="text" placeholder="ask grim..."/>
      <button id="gear-btn" title="Steer">⚙</button>
    </div>

    <!-- Gear panel (overlay from bottom) -->
    <div id="gear-panel" class="hidden">
      <div id="steer-modes">
        <button class="mode-btn" data-mode="hurry">I'm in a hurry</button>
        <button class="mode-btn" data-mode="explore">Let's explore</button>
        <button class="mode-btn" data-mode="explain">Explain as you go</button>
        <button class="mode-btn" data-mode="just-do">Just do it</button>
        <button class="mode-btn" data-mode="learning">I'm learning</button>
      </div>
      <div id="steer-modifiers">
        <button class="modifier-btn" data-modifier="minimise-tokens">Minimise tokens</button>
      </div>
    </div>

  </div>

  <!-- Ask response overlay -->
  <div id="ask-overlay" class="hidden">
    <div id="ask-response"></div>
    <span id="ask-dismiss">tap to dismiss</span>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
